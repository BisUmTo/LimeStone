<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LimeStone Simulator</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="blocks/tnt.png">
</head>
<body>

<div class="sidebar">
  <div id="blockSidebar">
    <input type="file" id="file-input" accept=".json" style="display: none;">
    <div class="widget" id="openWidget" title="Apri (Ctrl+O)">
      <span style="font-size: 32px; display: block; text-align: center; line-height: 48px;">📂</span>
      <span>Apri</span>
    </div>
    <div class="widget" id="saveWidget" title="Salva (Ctrl+S)">
      <span style="font-size: 32px; display: block; text-align: center; line-height: 48px;">💾</span>
      <span>Salva</span>
    </div>
    <div class="widget" id="cursorWidget">
      <img src="block_bases/cursor.png">
      <span>Cursor</span>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="grid-container">
    <section class="image-grid" id="grid"></section>
  </div>
</div>

<script src="script.js"></script>
<script src="preloaded_stuff.js"></script>
</body>
</html>
